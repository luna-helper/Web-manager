<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루나월드 통합 매니저 v 1.0.1 release</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>🌙 루나월드 통합 매니저 v 1.0.1 </h1>
        <div class="main-tabs">
            <button class="tab-btn active" onclick="switchTab('farm')">👨‍🌾 농사</button>
            <button class="tab-btn" onclick="switchTab('fish')">🎣 낚시</button>
            <button class="tab-btn" onclick="switchTab('cook')">🍳 요리</button>
        </div>
    </header>

    <div id="farm-content" class="tab-content active">
        <div class="section price-setting-section">
            <div class="section-header"><h3>💰 농작물 목표가 설정</h3></div>
            <div class="price-input-grid">
                <div class="input-field"><label>일반(커먼)</label><input type="number" id="farm-price-common" onchange="saveGlobalPrices()"></div>
                <div class="input-field"><label>은별(언커먼)</label><input type="number" id="farm-price-uncommon" onchange="saveGlobalPrices()"></div>
                <div class="input-field"><label>금별(레어)</label><input type="number" id="farm-price-rare" onchange="saveGlobalPrices()"></div>
            </div>
        </div>
        <div class="section">
            <div class="section-header"><h3>🌱 농작물 등록</h3></div>
            <div class="input-panel">
                <div class="input-field">
                    <label>작물 종류</label>
                    <select id="farmSelect"></select>
                </div>
                <div class="input-field">
                    <label>등급</label>
                    <select id="farmGrade">
                        <option value="커먼">일반 (커먼)</option>
                        <option value="언커먼">은별 (언커먼)</option>
                        <option value="레어">금별 (레어)</option>
                    </select>
                </div>
                <div class="input-field"><label>유통기한</label><input type="date" id="farmExpiry"></div>
                <button class="btn-primary" onclick="saveItem('farm')">등록</button>
            </div>
            <div id="farmFilters" class="category-grid"></div>
            <div id="farmGrid" class="item-grid"></div>
        </div>
    </div>

    <div id="fish-content" class="tab-content">
        <div class="section price-setting-section">
            <div class="section-header"><h3>💰 수산물 목표가 설정</h3></div>
            <div class="price-input-grid">
                <div class="input-field"><label>일반(커먼)</label><input type="number" id="fish-price-common" onchange="saveGlobalPrices()"></div>
                <div class="input-field"><label>은별(언커먼)</label><input type="number" id="fish-price-uncommon" onchange="saveGlobalPrices()"></div>
                <div class="input-field"><label>금별(레어)</label><input type="number" id="fish-price-rare" onchange="saveGlobalPrices()"></div>
            </div>
        </div>
        <div class="section">
            <div class="section-header"><h3>🎣 수산물 등록</h3></div>
            <div class="input-panel">
                <div class="input-field">
                    <label>물고기 종류</label>
                    <select id="fishSelect"></select>
                </div>
                <div class="input-field">
                    <label>등급</label>
                    <select id="fishGrade">
                        <option value="커먼">일반 (커먼)</option>
                        <option value="언커먼">은별 (언커먼)</option>
                        <option value="레어">금별 (레어)</option>
                    </select>
                </div>
                <div class="input-field"><label>유통기한</label><input type="date" id="fishExpiry"></div>
                <button class="btn-primary" onclick="saveItem('fish')">등록</button>
            </div>
            <div id="fishFilters" class="category-grid"></div>
            <div id="fishGrid" class="item-grid"></div>
        </div>
    </div>

    <div id="cook-content" class="tab-content">
        <div class="section price-setting-section">
            <div class="section-header"><h3>💰 요리 티어별 목표가 설정</h3></div>
            <div class="price-input-grid cook-price-grid">
                <div class="tier-group"><span>1티어</span><input type="number" id="cook-price-t1-n" onchange="saveGlobalPrices()"><input type="number" id="cook-price-t1-s" onchange="saveGlobalPrices()"></div>
                <div class="tier-group"><span>2티어</span><input type="number" id="cook-price-t2-n" onchange="saveGlobalPrices()"><input type="number" id="cook-price-t2-s" onchange="saveGlobalPrices()"></div>
                <div class="tier-group"><span>3티어</span><input type="number" id="cook-price-t3-n" onchange="saveGlobalPrices()"><input type="number" id="cook-price-t3-s" onchange="saveGlobalPrices()"></div>
            </div>
            <p class="guide-text" style="text-align:center">좌측: 일반 / 우측: 일품 가격</p>
        </div>
        <div class="section">
            <div class="section-header"><h3>🍳 요리 등록</h3></div>
            <div class="input-panel">
                <div class="input-field">
                    <label>요리 이름</label>
                    <select id="cookSelect"></select>
                </div>
                <div class="input-field">
                    <label>등급</label>
                    <select id="cookGrade">
                        <option value="일반">일반</option>
                        <option value="일품">일품</option>
                    </select>
                </div>
                <div class="input-field"><label>유통기한</label><input type="date" id="cookExpiry"></div>
                <button class="btn-primary" onclick="saveItem('cook')">등록</button>
            </div>
            <div id="cookFilters" class="category-grid"></div>
            <div id="cookGrid" class="item-grid"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-header"><h2>📈 실시간 시세 입력</h2></div>
        <div class="market-panel">
            <textarea id="marketData" placeholder="디스코드 시세를 복사해 넣으세요."></textarea>
            <button class="btn-analyze" onclick="analyzeMarket()">🚀 통합 시세 분석 실행</button>
        </div>
    </div>

    <div class="section">
        <div class="section-header"><h2>💰 분석 결과</h2></div>
        <div id="analysisResult" class="result-placeholder">분석 버튼을 누르세요.</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
